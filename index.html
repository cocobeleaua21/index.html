<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intrebare</title>
  <style>
    :root {
      --bg1: #ffd2e2;
      --bg2: #ffa3c2;
      --card: #fff8fb;
      --text: #2d1b24;
      --yes: #27b36b;
      --no: #ff4f87;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(140deg, var(--bg1), var(--bg2));
      color: var(--text);
    }

    .card {
      width: min(94vw, 560px);
      background: var(--card);
      border-radius: 22px;
      padding: 24px 16px;
      text-align: center;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.16);
      overflow: hidden;
    }

    .question-area {
      height: 110px;
      display: grid;
      place-items: center;
      position: relative;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      transition: transform 0.3s ease;
      will-change: transform;
    }

    h1.jump {
      animation: pulse 0.22s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      40% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 12px 20px;
      cursor: pointer;
      touch-action: manipulation;
    }

    #yesBtn {
      background: var(--yes);
    }

    #noBtn {
      background: var(--no);
    }

    #result {
      margin-top: 14px;
      min-height: 1.4em;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="question-area" id="questionArea">
      <h1 id="question">radu raducu e urat?</h1>
    </div>

    <div class="buttons">
      <button id="yesBtn" type="button">Da</button>
      <button id="noBtn" type="button">Nu</button>
    </div>

    <div id="result" aria-live="polite"></div>
  </main>

  <script>
    const question = document.getElementById("question");
    const questionArea = document.getElementById("questionArea");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const result = document.getElementById("result");

    noBtn.addEventListener("click", () => {
      const maxX = Math.max(20, (questionArea.clientWidth - question.clientWidth) / 2);
      const maxY = Math.max(12, (questionArea.clientHeight - question.clientHeight) / 2);

      const x = (Math.random() * 2 - 1) * maxX;
      const y = (Math.random() * 2 - 1) * maxY;
      const rot = (Math.random() * 2 - 1) * 8;

      question.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;
      question.classList.remove("jump");
      void question.offsetWidth;
      question.classList.add("jump");

      result.textContent = "Textul s-a mutat pentru ca ai apasat pe Nu.";
    });

    yesBtn.addEventListener("click", () => {
      question.style.transform = "translate(0, 0) rotate(0deg)";
      result.textContent = "Ai apasat pe Da.";
    });
  </script>
</body>
</html>
