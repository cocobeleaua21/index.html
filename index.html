<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intrebare colorata</title>
  <style>
    :root {
      --pink: #ff4f93;
      --yellow: #ffe66b;
      --blue: #42a5ff;
      --mint: #48d5b2;
      --violet: #9d5cff;
      --card: rgba(255, 255, 255, 0.92);
      --text: #2b1230;
      --yes: #25b36a;
      --no: #ff3f7a;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 8% 15%, #ffd1e8 0 12%, transparent 13%),
        radial-gradient(circle at 90% 18%, #b7f0ff 0 14%, transparent 15%),
        radial-gradient(circle at 15% 88%, #fff6aa 0 13%, transparent 14%),
        linear-gradient(130deg, var(--pink), var(--yellow), var(--blue), var(--mint), var(--violet));
      background-size: auto, auto, auto, 300% 300%;
      animation: rainbowBG 12s ease infinite;
    }

    @keyframes rainbowBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .pony-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .pony {
      position: absolute;
      font-size: clamp(22px, 4vw, 40px);
      opacity: 0.5;
      animation: float 7s ease-in-out infinite;
    }

    .pony:nth-child(2n) {
      animation-duration: 9s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50% { transform: translateY(-14px) rotate(4deg); }
    }

    .card {
      width: min(94vw, 620px);
      padding: 24px 16px 18px;
      border-radius: 24px;
      text-align: center;
      background: var(--card);
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.22);
      position: relative;
      z-index: 2;
      border: 4px solid transparent;
      background-image:
        linear-gradient(var(--card), var(--card)),
        linear-gradient(90deg, #ff1744, #ff9100, #ffee00, #00e676, #00b0ff, #7c4dff);
      background-origin: border-box;
      background-clip: padding-box, border-box;
    }

    .lgbtq-badge {
      margin: 0 auto 14px;
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      color: #fff;
      font-weight: 800;
      letter-spacing: 0.4px;
      background: linear-gradient(90deg, #e40303, #ff8c00, #ffed00, #008026, #004dff, #750787);
      box-shadow: 0 10px 20px rgba(117, 7, 135, 0.25);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.8rem, 6.5vw, 2.8rem);
      color: #63123f;
      text-shadow: 0 2px 0 #fff;
    }

    .buttons {
      min-height: 64px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 20px;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      touch-action: manipulation;
    }

    #yesBtn {
      background: var(--yes);
      box-shadow: 0 10px 22px rgba(37, 179, 106, 0.35);
    }

    #noBtn {
      background: var(--no);
      box-shadow: 0 10px 22px rgba(255, 63, 122, 0.35);
      position: relative;
    }

    #result {
      margin-top: 14px;
      min-height: 1.5em;
      font-weight: 700;
      color: #6a1c48;
    }
  </style>
</head>
<body>
  <div class="pony-layer" aria-hidden="true">
    <span class="pony" style="left: 4%; top: 8%;">🦄</span>
    <span class="pony" style="left: 19%; top: 74%;">🐴</span>
    <span class="pony" style="left: 34%; top: 18%;">🦄</span>
    <span class="pony" style="left: 49%; top: 80%;">🐴</span>
    <span class="pony" style="left: 62%; top: 10%;">🦄</span>
    <span class="pony" style="left: 76%; top: 68%;">🐴</span>
    <span class="pony" style="left: 88%; top: 30%;">🦄</span>
  </div>

  <main class="card">
    <div class="lgbtq-badge">🏳️‍🌈 LGBTQ+</div>
    <h1 id="question">zacky este un mic cacacios?</h1>

    <div class="buttons">
      <button id="yesBtn" type="button">Da</button>
      <button id="noBtn" type="button">Nu</button>
    </div>

    <div id="result" aria-live="polite"></div>
  </main>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const result = document.getElementById("result");

    function moveNoButton() {
      const maxX = window.innerWidth - noBtn.offsetWidth - 12;
      const maxY = window.innerHeight - noBtn.offsetHeight - 12;
      const x = Math.floor(Math.random() * Math.max(40, maxX));
      const y = Math.floor(Math.random() * Math.max(80, maxY));

      noBtn.style.position = "fixed";
      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
      noBtn.style.zIndex = "999";

      result.textContent = "Butonul 'Nu' isi schimba pozitia pe ecran.";
    }

    noBtn.addEventListener("click", moveNoButton);
    noBtn.addEventListener("touchstart", moveNoButton, { passive: true });

    yesBtn.addEventListener("click", () => {
      result.textContent = "Ai ales 'Da'.";
    });
  </script>
</body>
</html>
